name: 06-Context

on: workflow_dispatch

jobs:
  echo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Echo data
        run: |
          echo "Event name ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          echo "SHA: ${{ github.sha }}"
