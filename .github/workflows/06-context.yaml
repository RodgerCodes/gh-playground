name: 06-Context

on:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        default: false

env:
  MY_WORKFLOW_NAME: "workflow"

jobs:
  echo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Echo data
        run: |
          echo "Event name ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          echo "SHA: ${{ github.sha }}"
          echo "Workflow name: ${{ env.MY_WORKFLOW_NAME }}"
